spring.application.name=razzie-awards-api

# Banco H2 embarcado, em memória — não precisa instalar nada externo
spring.datasource.url=jdbc:h2:mem:razzie;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Arquivo CSV lido no startup (resource do classpath)
app.movies.csv=movielist.csv

# Erros padronizados no formato ProblemDetail (RFC 7807)
spring.mvc.problemdetails.enabled=true

# Observabilidade: por padrão exponho só o essencial e sem detalhes sensíveis.
# Console do H2, métricas e detalhes de health ficam no perfil "dev" (veja o README).
management.endpoints.web.exposure.include=health,info

# OpenAPI / Swagger UI em /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
