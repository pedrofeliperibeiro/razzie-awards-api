# Perfil "dev": conveniências para rodar e inspecionar localmente.
# Nada aqui deveria valer em produção — por isso fica fora do perfil padrão.
# Ative com: --spring.profiles.active=dev

# Console web do H2 em /h2-console
spring.h2.console.enabled=true

# Actuator mais aberto para a demo: métricas e detalhes completos de health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
